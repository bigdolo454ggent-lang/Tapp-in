<!DOCTYPE html>
<html>
<head>
  <title>Tap In</title>
  <style>
    body {
      background:#1f1f1f;
      color:white;
      font-family:Arial,sans-serif;
      padding:20px;
    }

    button {
      background:#650000;
      color:white;
      border:none;
      padding:10px;
      margin:5px;
    }

    #timer {
      color:limegreen;
    }

    video {
      width:45%;
      background:black;
      margin:5px;
    }

    #callPopup {
      display:none;
      position:fixed;
      top:20%;
      left:50%;
      transform:translateX(-50%);
      background:#2a2a2a;
      padding:20px;
      border:2px solid #650000;
    }
  </style>
</head>
<body>

<h2>Tap In</h2>

<input id="msg" placeholder="message">
<button onclick="sendMsg()">Send</button>

<div id="chat"></div>

<h3 id="timer">00:00</h3>

<button onclick="startCall()">Start Video Call</button>

<div id="callPopup">
  <h3 id="callerName">Incoming Call</h3>
  <button onclick="acceptCall()">Accept</button>
  <button onclick="rejectCall()">Decline</button>
</div>

<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
